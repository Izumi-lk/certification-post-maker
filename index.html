<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-title" content="スミン認証メーカー">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>スミン認証メーカー</title>
  <link rel="apple-touch-icon" href="https://drive.google.com/uc?id=1w98S6r5557INAW5JFjoWa3ccbuUfExHH&.png">
  <link rel="icon" href="https://script.google.com/macros/s/AKfycbzts6i6DzuBMAbn5Sj6h7MnpPQJUCNwbi9zI0ttXHwm/dev">
  <?!= include('style'); ?>
</head>
<body>
  <div class="wrap">
    <div class="title">スミン認証メーカー</div>
    <div class="sub">
      4枚のスクショをまとめて加工／MV投稿用・音源投稿用の投稿文コピー・返信先オープン
    </div>

    <!-- 1. 共通設定 -->
    <div class="card">
      <div class="section-title">1. 共通設定</div>

      <div class="field">
        <label class="label" for="xIdInput">画像に入れるX ID</label>
        <input type="text" id="xIdInput" value="@inu_5122" />
      </div>

      <div class="field">
        <label class="label" for="imageFiles">画像アップロード</label>
        <input type="file" id="imageFiles" accept="image/*" multiple />
        <div class="hint">4枚まとめて選択してください。1,2枚目がMV用、3,4枚目が音源用として扱われます。</div>
      </div>

      <button class="btn" id="generateBtn" type="button">画像を生成</button>
      <button class="btn secondary" id="shareAllBtn" type="button">4枚まとめて保存</button>

      <div class="status" id="generateStatus"></div>
      <div class="status" id="resultStatus"></div>
    </div>

    <!-- 2. MV投稿設定 -->
    <div class="card">
      <div class="section-title">2. MV投稿設定</div>

      <div class="field">
        <label class="label" for="mvPostText">MV投稿文プレビュー</label>
        <div class="hint">現在時刻から自動生成されます。形式：1/2 2pm</div>
        <textarea id="mvPostText">#내가_살아있다는_증거_MV_스트리밍</textarea>
      </div>

      <div class="field">
        <label class="label" for="mvPostIdInput">MV返信先投稿ID</label>
        <input type="text" id="mvPostIdInput" placeholder="例: 2029738614851260425" />
      </div>
        <a id="mvActionLink" class="btn secondary link-btn" href="#" target="_top" rel="noopener">
          投稿文をコピーして返信先を開く
        </a>
    </div>

    <!-- 3. 音源投稿設定 -->
    <div class="card">
      <div class="section-title">3. 音源投稿設定</div>

      <div class="field">
        <label class="label" for="stPostText">音源投稿文プレビュー</label>
        <div class="hint">現在時刻から自動生成されます。形式：1/2 2pm</div>
        <textarea id="stPostText">#내가_살아있다는_증거_음원_스트리밍</textarea>
      </div>

      <div class="field">
        <label class="label" for="stPostIdInput">音源返信先投稿ID</label>
        <input type="text" id="stPostIdInput" placeholder="例: 2029738614851260425" />
      </div>
        <a id="stActionLink" class="btn secondary link-btn" href="#" target="_top" rel="noopener">
          投稿文をコピーして返信先を開く
        </a>
    </div>

    <!-- 4. MV生成結果 -->
    <div class="card">
      <div class="section-title">4. MV生成結果</div>
      <div class="preview-grid" id="mvPreviewGrid">
        <!-- JSで image1 / image2 のプレビューを描画 -->
      </div>
    </div>

    <!-- 5. 音源生成結果 -->
    <div class="card">
      <div class="section-title">5. 音源生成結果</div>
      <div class="preview-grid" id="stPreviewGrid">
        <!-- JSで image3 / image4 のプレビューを描画 -->
      </div>
    </div>
  </div>
  <?!= include('script'); ?>
</body>
</html>
