<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>スミン認証メーカー</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="wrap">
    <div class="title">スミン認証メーカー</div>
    <div class="sub">
      1〜4枚の画像をまとめて加工。設定パターンを切り替えながら、投稿文コピーと画像保存ができます。
    </div>

    <!-- 設定パターン -->
    <div class="card">
      <div class="section-title">設定パターン</div>
      <div class="pattern-tabs">
        <button class="tab active" type="button" data-pattern="1">パターン1</button>
        <button class="tab" type="button" data-pattern="2">パターン2</button>
        <button class="tab" type="button" data-pattern="3">パターン3</button>
      </div>
      <button class="btn secondary" id="copyPostBtn" type="button">投稿文をコピーして新しいポストを開く</button>
      <!-- ステータス表示はしない -->
      <div class="status" id="settingsStatus" style="display: none;"></div>
    </div>

    <!-- 画像アップロード -->
    <div class="card">
      <div class="section-title">画像アップロード</div>

      <div class="field">
        <label class="label" for="imageFiles">画像アップロード</label>
        <input type="file" id="imageFiles" accept="image/*" multiple />
        <div class="hint">1〜4枚まで選択できます。選択したすべての画像に同じ設定を適用します。</div>
      </div>
    </div>

    <!-- プレビュー -->
    <div class="card">
      <div class="preview-topbar">
        <div class="section-title preview-title">プレビュー</div>
        <button class="btn preview-save-all-btn" id="shareAllBtn" type="button">
          まとめて保存
        </button>
      </div>

      <div class="preview-switcher">
        <button class="preview-nav" id="prevPreviewBtn" type="button" aria-label="前の画像">◀</button>
        <div class="preview-file-name" id="previewFileName">sample.png</div>
        <button class="preview-nav" id="nextPreviewBtn" type="button" aria-label="次の画像">▶</button>
      </div>

      <div class="preview-stage">
        <img class="preview-main-img" id="previewMainImg" src="" alt="サンプル画像" />
      </div>

      <div class="toolbar-embed">
        <div class="dock-panel">
          <input type="color" id="toolbarTextColorCustomInput" hidden />
          <input type="color" id="toolbarOutlineColorCustomInput" hidden />
          <input type="color" id="toolbarHighlightColorCustomInput" hidden />
          <div class="panel-top">
            <!--
            <div class="panel-heading">
              <div class="panel-title" id="toolbarPanelTitle">フォント</div>
              <div class="panel-subtitle" id="toolbarPanelSubtitle">候補から1つ選択</div>
            </div>
            
            <div class="panel-value compact" id="toolbarPanelValue">標準</div>-->
          </div>

          <div class="panel-body" id="toolbarPanelBody"></div>
        </div>

        <div class="dock-tools dock-tools-scroll" id="toolbarCategoryBar">
          <button class="tool-btn active" type="button" data-category="font">
            <span class="tool-icon font"></span>
            <span class="tool-label">フォント</span>
          </button>

          <button class="tool-btn" type="button" data-category="textColor">
            <span class="tool-icon text-color"></span>
            <span class="tool-label">文字色</span>
          </button>

          <button class="tool-btn" type="button" data-category="size">
            <span class="tool-icon size"></span>
            <span class="tool-label">サイズ</span>
          </button>

          <button class="tool-btn" type="button" data-category="outline">
            <span class="tool-icon outline"></span>
            <span class="tool-label">アウトライン</span>
          </button>

          <button class="tool-btn" type="button" data-category="highlight">
            <span class="tool-icon highlight"></span>
            <span class="tool-label">ハイライト</span>
          </button>

          <button class="tool-btn" type="button" data-category="position">
            <span class="tool-icon position"></span>
            <span class="tool-label">位置</span>
          </button>

          <button class="tool-btn" type="button" data-category="opacity">
            <span class="tool-icon opacity"></span>
            <span class="tool-label">透明度</span>
          </button>

          <button class="tool-btn" type="button" data-category="lineHeight">
            <span class="tool-icon line-height"></span>
            <span class="tool-label">行間</span>
          </button>
        </div>
      </div>

      <div class="preview-actions preview-actions-single">
        <button class="mini-btn" id="shareCurrentBtn" type="button">
          この画像を保存 / 共有
        </button>
      </div>

      <!-- ウォーターマーク文字 -->
      <div class="field">
        <label class="label" for="watermarkText">ウォーターマーク文字（複数行可）</label>
        <textarea id="watermarkText">@inu_5122</textarea>
      </div>

      <!-- 投稿文 -->
      <div class="section-title subheading">投稿文</div>
      <div class="field">
        <label class="label" for="postText">本文・ハッシュタグ（自由入力）</label>
        <div id="timePreview" class="post-time-preview" aria-live="polite"></div>
        <textarea id="postText"></textarea>
      </div>

      <div class="field">
        <label class="check">
          <input type="checkbox" id="includeCurrentTimeInput" checked />
          現在時刻の自動生成文字列を先頭に含める
        </label>
      </div>
      <button class="btn" id="savePatternBtn" type="button">編集内容を保存</button>

      <!-- ステータス表示はしない -->
      <div class="status" id="generateStatus" style="display: none;"></div>
      <div class="status" id="resultStatus" style="display: none;"></div>
    </div>

    <!-- 設定編集 -->
    <details class="card collapsible-card" style="display: none;">
      <summary class="collapse-summary">
        <span>設定編集</span>
        <span class="collapse-hint">必要なときだけ開く</span>
      </summary>

      // TODO ここを消すとサンプル画像も消えてしまうので要調査
      <div class="collapse-body">

        <!-- 文字デザイン -->
        <div class="section-title subheading" style="display: none;">文字デザイン</div>
        <div class="row two-col-mobile">
          <div class="field">
            <label class="label" for="fontSizeInput">文字サイズ</label>
            <input type="number" id="fontSizeInput" min="1" value="32" disabled />
          </div>

          <div class="field">
            <label class="label" for="fontWeightInput">文字の太さ</label>
            <select id="fontWeightInput" disabled>
              <option value="300">Light</option>
              <option value="500" selected>Medium</option>
              <option value="700">Bold</option>
              <option value="900">Black</option>
            </select>
          </div>

          <div class="field">
            <label class="label" for="textColorInput">文字色</label>
            <input type="color" id="textColorInput" value="#ffffff" />
          </div>

          <div class="field" disabled>
            <label class="label" for="opacityInput">透明度（0〜100）</label>
            <input type="number" id="opacityInput" min="0" max="100" value="85" />
          </div>

          <div class="field">
            <label class="label" for="outlineColorInput">アウトライン色</label>
            <input type="color" id="outlineColorInput" value="#ff2b88" />
          </div>

          <div class="field">
            <label class="label" for="outlineWidthInput">アウトライン太さ</label>
            <input type="number" id="outlineWidthInput" min="0" value="20" disabled />
          </div>

          <div class="field">
            <label class="label" for="fontFamilySelect">フォント</label>
            <select id="fontFamilySelect" disabled>
              <option value='-apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif' selected>
                標準
              </option>
              <option value='"Hiragino Maru Gothic ProN", "Arial Rounded MT Bold", sans-serif'>
                丸ゴシック
              </option>
              <option value='"Hiragino Sans", "Yu Gothic", Meiryo, sans-serif'>
                日本語標準
              </option>
              <option value='"Arial Black", "Helvetica Neue", Arial, sans-serif'>
                インパクト
              </option>
              <option value='"Apple SD Gothic Neo", "Malgun Gothic", sans-serif'>
                韓国語向け
              </option>
            </select>
          </div>

          <div class="field">
            <label class="label" for="lineHeightSelect">行間隔</label>
            <select id="lineHeightSelect">
              <option value='1'>1</option>
              <option value='1.25'>1.25</option>
              <option value='1.5'>1.5</option>
              <option value='1.75'>1.75</option>
              <option value='2'>2</option>
            </select>
          </div>
        </div>

        <!-- ハイライト背景帯 -->
        <div class="section-title subheading" style="display: none;">ハイライト背景帯</div>

        <div class="field">
          <label class="check">
            <input type="checkbox" id="highlightEnabledInput" checked disabled />
            ハイライトを表示する
          </label>
        </div>

        <div class="row two-col-mobile">
          <div class="field">
            <label class="label" for="highlightColorInput">ハイライト色</label>
            <input type="color" id="highlightColorInput" value="#ffe4f0" disabled />
          </div>
          <div class="field">
            <label class="label" for="highlightPaddingInput">背景帯の余白量</label>
            <input type="number" id="highlightPaddingInput" value="8" disabled />
          </div>
        </div>
        <!-- 位置 -->
        <div class="section-title subheading" style="display: none;">位置</div>
        <div class="row two-col-mobile">
          <div class="field">
            <label class="label" for="positionXInput">X座標（-50〜50）</label>
            <input type="number" id="positionXInput" min="-50" max="50" value="0" disabled />
          </div>
          <div class="field">
            <label class="label" for="positionYInput">Y座標（-50〜50）</label>
            <input type="number" id="positionYInput" min="-50" max="50" value="0" disabled />
          </div>
        </div>


      </div>
    </details>

  </div>
  <script src="script.js" defer></script>
</body>

<footer>
  <div class="footer-content">
    <div class="footer-item">© 2026 Izumi</div>
  </div>
</footer>

</html>
